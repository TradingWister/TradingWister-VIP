<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingWister线下版权课</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #161920;
            --surface2: #1e2230;
            --border: #2a2f40;
            --accent: #4f8ef7;
            --accent2: #f7594f;
            --accent3: #4fda9f;
            --text: #e4e8f5;
            --text-muted: #6b738a;
            --tab-active-bg: #1e2230;
            --radius: 10px;
            --transition: 0.22s cubic-bezier(.4,0,.2,1);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Player Side ── */
        .player-side {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }

        .video-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 40px rgba(0,0,0,.6);
            border: 1px solid var(--border);
        }
        
        .video-js {
            width: 100%;
            height: 500px;
        }

        .video-wrap video {
            width: 100%;
            display: block;
        }

        .course-meta {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .course-meta h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.01em;
            color: var(--text);
        }

        .course-meta p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        /* ── Playlist Side ── */
        .playlist-side {
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 0 0 14px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .badge {
            font-size: 0.9rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 10px;
            color: var(--text-muted);
        }

        /* ── Tabs ── */
        .tabs-bar {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 6px 6px 0;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            position: relative;
            padding: 8px 14px 10px;
            font-size: 0.82rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: color var(--transition), background var(--transition);
            white-space: nowrap;
            outline: none;
        }

        .tab-btn:hover { color: var(--text); background: var(--surface2); }

        .tab-btn.active {
            color: var(--accent);
            background: var(--surface2);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        .tab-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        /* ── Playlist Panel ── */
        .panels-wrap {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            overflow: hidden;
            position: relative;
        }

        .tab-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .tab-panel::-webkit-scrollbar { width: 4px; }
        .tab-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .tab-panel.active { display: flex; }

        /* ── Course Item ── */
        .course-item {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 11px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background var(--transition);
            border: 1px solid transparent;
            margin-bottom: 4px;
        }

        .course-item:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .course-item.playing {
            background: rgba(79,142,247,.08);
            border-color: rgba(79,142,247,.25);
        }

        .course-item.playing .item-title { color: var(--accent); }

        .course-item.completed .item-num::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(79,218,159,.15);
            color: var(--accent3);
            border-radius: 50%;
            font-size: 0.65rem;
        }

        .item-num {
            position: relative;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .course-item.playing .item-num {
            background: rgba(79,142,247,.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Play animation for current item */
        .course-item.playing .item-num::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: pulse-ring 1.6s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: .6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .item-info { min-width: 0; }

        .item-title {
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .item-desc {
            font-size: 0.72rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-duration {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-shrink: 0;
            background: var(--surface2);
            border-radius: 4px;
            padding: 2px 6px;
        }

        .get-license-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #0066ff !important;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* ── Responsive ── */
        @media (max-width: 860px) {
            .layout {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
            }
            .playlist-side { height: 420px; }
        }
    </style>
</head>
<body>

<div class="layout">
    <!-- Left: Player -->
    <div class="player-side">
        <div class="video-wrap">
            <video
                id="zjget_player"
                class="video-js vjs-big-play-centered vjs-theme-sea"
                controls
                preload="auto"
                poster="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&h=450&fit=crop"
                data-setup='{}'>

    </div>
</div>

<!-- Video.js JS -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
// ─── Course Data: multiple tabs ───────────────────────────────────────────────
const chapters = [

            {

                duration: '01:36:21',
                completed: false
            },
            {
                id: 'c10',
                title: '6',
                description: '第二天 晚上',
                videoUrl: 'https://1317194751.vod-qcloud.com/8db26209vodcq1317194751/dd3976495145403721858198445/mM5MlQHE228A.mp4',
                duration: '32:51',
                completed: false
            },
            {
                id: 'c11',
                title: '7',
                description: '第三天上午',
                videoUrl: 'https://1317194751.vod-qcloud.com/8db26209vodcq1317194751/af6a56215145403721888713072/pMTNjBjbEaEA.mp4',
                duration: '01:25:18',
                completed: false
            },
        ]
    }
];

// ─── Flat list (keeps zjgetOnlinePlayerForCloud.js happy + powers auto-next) ──
const courses = chapters.flatMap(ch => ch.courses);

function getCourseById(id) {
    return courses.find(c => c.id === id) || null;
}

function getNextCourse(id) {
    const idx = courses.findIndex(c => c.id === id);
    return idx >= 0 && idx < courses.length - 1 ? courses[idx + 1] : null;
}

function markCompleted(id) {
    const course = getCourseById(id);
    if (course) course.completed = true;
    const el = document.querySelector(`.course-item[data-id="${id}"]`);
    if (el) el.classList.add('completed');
}

// ─── State ────────────────────────────────────────────────────────────────────
let player;
let currentCourseId = chapters[0].courses[0].id;
let activeTab = 0;

// ─── Build UI ─────────────────────────────────────────────────────────────────
function buildUI() {
    const tabsBar = document.getElementById('tabsBar');
    const panelsWrap = document.getElementById('panelsWrap');
    const total = chapters.reduce((s, c) => s + c.courses.length, 0);
    document.getElementById('courseCount').textContent = `共 ${total} 节课`;

    chapters.forEach((ch, ti) => {
        // Tab button
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (ti === 0 ? ' active' : '');
        btn.dataset.tab = ti;
        btn.innerHTML = `<span class="tab-dot" style="background:${ch.color}"></span>${ch.label}`;
        btn.addEventListener('click', () => switchTab(ti));
        tabsBar.appendChild(btn);

        // Panel
        const panel = document.createElement('div');
        panel.className = 'tab-panel' + (ti === 0 ? ' active' : '');
        panel.id = `panel-${ti}`;

        ch.courses.forEach((course, ci) => {
            const item = document.createElement('div');
            item.className = 'course-item' + (course.id === currentCourseId ? ' playing' : '');
            item.dataset.id = course.id;
            item.dataset.tab = ti;
            item.innerHTML = `
                <div class="item-num">${ci + 1}</div>
                <div class="item-info">
                    <div class="item-title">${course.title}</div>
                    <div class="item-desc">${course.description}</div>
                </div>
                <div class="item-duration">${course.duration}</div>
            `;
            item.addEventListener('click', () => playCourse(course));
            panel.appendChild(item);
        });

        panelsWrap.appendChild(panel);
    });
}

function switchTab(ti) {
    activeTab = ti;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', +b.dataset.tab === ti));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${ti}`));
}

function playCourse(course) {
    currentCourseId = course.id;

    // Update meta
    document.getElementById('currentTitle').textContent = course.title;
    document.getElementById('currentDesc').textContent = course.description;

    // Update playing state
    document.querySelectorAll('.course-item').forEach(el => {
        el.classList.toggle('playing', el.dataset.id === course.id);
    });

    // Update video
    if (player) {
        player.src({ type: 'video/mp4', src: course.videoUrl });
        player.play();
    }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {

    // 1. 构建播放列表 UI
    buildUI();

    // 2. 初始化播放器（唯一入口，原 zjgetOnlinePlayerForCloud.js 不再重复初始化）
    player = videojs('zjget_player', {
        responsive: true,
        fluid: true,
        aspectRatio: '16:9',
        playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
        controls: true,
        autoplay: false,
        preload: 'metadata',
        controlBar: {
            pictureInPictureToggle: false,
        }
    });

    // 3. 设置初始课程信息
    const first = chapters[0].courses[0];
    document.getElementById('currentTitle').textContent = first.title;
    document.getElementById('currentDesc').textContent = first.description;

    // ─── 语言配置 ─────────────────────────────────────────────────────────────
    const currentLang = 'zh';
    const uiMessages = {
        zh: {
            drmVideoOnly: '当前视频为 DRM-X 加密视频，请使用 ZJGet 浏览器播放！',
            downloadBtn: '下载 ZJGet',
            encryptedNeedLicense: '当前视频为加密视频，请先点击按钮获取许可证！',
            getLicenseBtn: '获取许可证'
        }
    };
    function t(key) {
        return (uiMessages[currentLang] && uiMessages[currentLang][key]) || uiMessages.zh[key] || '';
    }

    // ─── 播放按钮可见性 ────────────────────────────────────────────────────────
    let isSeeking = false;
    function updatePlayButtonVisibility() {
        const bigPlayButton = document.querySelector('.vjs-big-play-button');
        if (bigPlayButton) {
            bigPlayButton.style.display = (player.paused() && !isSeeking) ? 'block' : 'none';
        }
    }

    // ─── 播放器事件 ────────────────────────────────────────────────────────────
    player.on('ready', function () {
        console.log('VideoJS 播放器已准备就绪');
        initTouchEvents();
    });

    player.on('play', function (event) {
        console.log('视频开始播放');
        updatePlayButtonVisibility();
        let isSupp = player.canPlayType('zjget');
        if (isSupp === '') {
            supportType(event, 'video/ogg', 'theora, vorbis');
        }
    });

    player.on('pause', function () {
        console.log('视频已暂停');
        updatePlayButtonVisibility();
    });

    player.on('seeking', function () {
        isSeeking = true;
        updatePlayButtonVisibility();
    });

    player.on('seeked', function () {
        setTimeout(() => {
            isSeeking = false;
            updatePlayButtonVisibility();
        }, 100);
    });

    // ─── ended：标记完成 + 自动播放下一节 ─────────────────────────────────────
    player.on('ended', function () {
        console.log('视频播放结束');

        // 标记当前课程完成
        markCompleted(currentCourseId);

        // 同步 flat courses 数组里的 completed 状态（供外部脚本读取）
        const flatCourse = courses.find(c => c.id === currentCourseId);
        if (flatCourse) flatCourse.completed = true;

        // 自动播放下一节（1.5s 延迟，与原逻辑一致）
        const next = getNextCourse(currentCourseId);
        if (next) {
            setTimeout(() => {
                // 切换到包含下一节的 Tab
                chapters.forEach((ch, ti) => {
                    if (ch.courses.some(c => c.id === next.id)) switchTab(ti);
                });
                playCourse(next);
            }, 1500);
        }
    });

    player.on('error', function () {
        console.error('视频播放出错');
        setTimeout(() => {
            const errorDialog = document.querySelector('.vjs-modal-dialog-content');
            if (errorDialog && errorDialog.innerHTML.includes('The media could not be loaded')) {
                if (navigator.userAgent.indexOf('ZJGet') === -1) {
                    errorDialog.innerHTML = `
                        ${t('drmVideoOnly')}<br>
                        <a href="https://www.zjget.com/cn/index.html#download" style="color:#fff">
                            <button class="get-license-btn">${t('downloadBtn')}</button>
                        </a>`;
                } else {
                    errorDialog.innerHTML = `
                        ${t('encryptedNeedLicense')}<br>
                        <button class="get-license-btn"
                            onclick="supportType(event,'video/ogg','theora, vorbis')">
                            ${t('getLicenseBtn')}
                        </button>`;
                    addCustomPlayButton();
                }
            }
        }, 100);
    });

    player.on('dblclick', toggleFullscreen);

    // ─── 键盘快捷键 ───────────────────────────────────────────────────────────
    let isRightArrowPressed = false;
    let originalPlaybackRate = 1;
    let rightArrowTimer = null;
    let isLongPress = false;

    document.addEventListener('keydown', handleKeyPress);
    document.addEventListener('keyup', function (e) {
        if (e.code === 'ArrowRight') {
            clearTimeout(rightArrowTimer);
            if (isLongPress) {
                player.playbackRate(originalPlaybackRate);
                hideSpeedOverlay();
            } else if (!player.paused()) {
                player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
            }
            isRightArrowPressed = false;
            isLongPress = false;
            rightArrowTimer = null;
        }
    });

    function handleKeyPress(e) {
        switch (e.code) {
            case 'Space':
                e.preventDefault();
                togglePlay();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                if (!player.paused()) player.currentTime(Math.max(0, player.currentTime() - 10));
                break;
            case 'ArrowRight':
                e.preventDefault();
                if (!isRightArrowPressed) {
                    isRightArrowPressed = true;
                    rightArrowTimer = setTimeout(() => {
                        if (!player.paused()) {
                            isLongPress = true;
                            originalPlaybackRate = player.playbackRate();
                            player.playbackRate(2);
                            showSpeedOverlay('2.0x');
                        }
                    }, 300);
                }
                break;
            case 'ArrowUp':
                e.preventDefault();
                if (player.volume() < 1) player.volume(player.volume() + 0.1);
                break;
            case 'ArrowDown':
                e.preventDefault();
                if (player.volume() > 0) player.volume(player.volume() - 0.1);
                break;
        }
    }

    // ─── 工具函数 ─────────────────────────────────────────────────────────────
    window.supportType = function (e, vidType, codType) {
        let HTML5Player = document.getElementById('zjget_player_html5_api');
        let isSupp = HTML5Player.canPlayType('zjget');
        let licURL = isSupp.substring(isSupp.indexOf('https://'));
        if (isSupp.indexOf('https://') > 0) window.location.href = licURL;
    };

    function addCustomPlayButton() {
        const container = document.getElementById('zjget_player');
        if (!container) return;
        const btn = document.createElement('button');
        btn.className = 'vjs-big-play-button custom-added';
        btn.type = 'button';
        btn.title = 'Play Video';
        btn.style.setProperty('display', 'block', 'important');
        btn.style.zIndex = '999';
        btn.setAttribute('aria-disabled', 'false');
        btn.setAttribute('onclick', "supportType(event,'video/ogg','theora, vorbis'); event.stopPropagation();");
        const icon = document.createElement('span');
        icon.className = 'vjs-icon-placeholder';
        icon.setAttribute('aria-hidden', 'true');
        const text = document.createElement('span');
        text.className = 'vjs-control-text';
        text.setAttribute('aria-live', 'polite');
        text.innerText = 'Play Video';
        btn.appendChild(icon);
        btn.appendChild(text);
        container.appendChild(btn);
    }

    function togglePlay() {
        player.paused() ? player.play() : player.pause();
    }

    function toggleFullscreen() {
        player.isFullscreen() ? player.exitFullscreen() : player.requestFullscreen();
    }

    // ─── 倍速提示 Overlay ─────────────────────────────────────────────────────
    let speedOverlay = null;

    function createSpeedOverlay() {
        if (speedOverlay) return;
        speedOverlay = document.createElement('div');
        speedOverlay.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;z-index:9999;';
        const iconContainer = document.createElement('div');
        iconContainer.style.cssText = 'position:relative;width:30px;height:30px;display:flex;align-items:center;justify-content:center;';
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('width', '20'); svg.setAttribute('height', '20');
        svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'white');
        const t1 = document.createElementNS(svgNS, 'polygon');
        t1.setAttribute('points', '3,3 3,21 15,12'); t1.setAttribute('fill', 'white');
        const t2 = document.createElementNS(svgNS, 'polygon');
        t2.setAttribute('points', '9,3 9,21 21,12'); t2.setAttribute('fill', 'white');
        svg.appendChild(t1); svg.appendChild(t2);
        iconContainer.appendChild(svg);
        const txt = document.createElement('div');
        txt.id = 'speed-text';
        txt.style.cssText = 'color:#fff;font-size:14px;';
        txt.innerText = '2.0x';
        speedOverlay.appendChild(iconContainer);
        speedOverlay.appendChild(txt);
        player.el().appendChild(speedOverlay);
    }

    function showSpeedOverlay(speed) {
        createSpeedOverlay();
        speedOverlay.querySelector('#speed-text').innerText = speed;
        speedOverlay.style.display = 'flex';
    }

    function hideSpeedOverlay() {
        if (speedOverlay) speedOverlay.style.display = 'none';
    }

    // ─── 触摸事件（移动端长按 2x / 滑动快进退）────────────────────────────────
    function initTouchEvents() {
        const playerElement = player.el();
        let touchStartTime = 0, touchStartX = 0, touchStartY = 0;
        let longPressTimer = null, isLongPressActive = false, originalPlaybackRateM = 1;
        const LONG_PRESS_THRESHOLD = 500;

        playerElement.addEventListener('touchstart', function (e) {
            if (e.touches.length !== 1) return;
            touchStartTime = Date.now();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            longPressTimer = setTimeout(function () {
                if (!isLongPressActive && !player.paused()) {
                    originalPlaybackRateM = player.playbackRate();
                    player.playbackRate(2);
                    isLongPressActive = true;
                    showSpeedOverlay('2.0x');
                }
            }, LONG_PRESS_THRESHOLD);
        });

        playerElement.addEventListener('touchmove', function (e) {
            if (e.touches.length === 1 && longPressTimer) {
                if (Math.abs(e.touches[0].clientX - touchStartX) > 10 ||
                    Math.abs(e.touches[0].clientY - touchStartY) > 10) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
            }
        });

        playerElement.addEventListener('touchend', function (e) {
            clearTimeout(longPressTimer);
            if (isLongPressActive) {
                player.playbackRate(originalPlaybackRateM);
                isLongPressActive = false;
                hideSpeedOverlay();
            } else if (touchStartTime > 0) {
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const dir = getDirection(touchStartX, touchStartY, endX, endY);
                if (dir === 3 && !player.paused()) {
                    player.currentTime(player.currentTime() - 10);
                } else if (dir === 4 && !player.paused()) {
                    player.currentTime(player.currentTime() + 10);
                } else if (Date.now() - touchStartTime < LONG_PRESS_THRESHOLD) {
                    const isPlayBtn = e.target.closest('.vjs-big-play-button') ||
                        e.target.closest('.vjs-play-control') ||
                        e.target.closest('.vjs-play-button');
                    if (!isPlayBtn) togglePlay();
                }
            }
            touchStartTime = 0;
            longPressTimer = null;
        });

        playerElement.addEventListener('touchcancel', function () {
            clearTimeout(longPressTimer);
            if (isLongPressActive) {
                player.playbackRate(originalPlaybackRateM);
                isLongPressActive = false;
                hideSpeedOverlay();
            }
            touchStartTime = 0;
            longPressTimer = null;
        });
    }

    // ─── 滑动方向判断 ─────────────────────────────────────────────────────────
    function getAngle(angx, angy) { return Math.atan2(angy, angx) * 180 / Math.PI; }
    function getDirection(startx, starty, endx, endy) {
        const angx = endx - startx, angy = endy - starty;
        if (Math.abs(angx) < 2 && Math.abs(angy) < 2) return 0;
        const angle = getAngle(angx, angy);
        if (angle >= -135 && angle <= -45) return 1;
        if (angle > 45 && angle < 135) return 2;
        if ((angle >= 135 && angle <= 180) || (angle >= -180 && angle < -135)) return 3;
        if (angle >= -45 && angle <= 45) return 4;
        return 0;
    }

}); // end DOMContentLoaded

</script>
